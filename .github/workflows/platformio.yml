name: Build Firmware

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e waveshare_esp32_s3_touch_lcd_1_85

      - name: Read firmware version
        id: version
        run: |
          VER=$(grep -oP '(?<=FIRMWARE_VERSION = ")[^"]+' include/BoardConfig.h)
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Create merged binary
        run: |
          ESPTOOL=$(find ~/.platformio -name esptool.py | head -1)
          BUILD=.pio/build/waveshare_esp32_s3_touch_lcd_1_85
          BOOT=$BUILD/bootloader.bin
          PARTS=$BUILD/partitions.bin
          BOOT_APP0=$(find ~/.platformio -name boot_app0.bin | head -1)
          APP=$BUILD/firmware.bin
          python "$ESPTOOL" --chip esp32s3 merge_bin \
            -o firmware-merged.bin \
            --flash_mode qio --flash_freq 80m --flash_size 16MB \
            0x0 "$BOOT" 0x8000 "$PARTS" 0xe000 "$BOOT_APP0" 0x10000 "$APP"
          sha256sum "$APP" firmware-merged.bin > checksums.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: r48display-v${{ steps.version.outputs.version }}-${{ github.sha }}
          path: |
            .pio/build/waveshare_esp32_s3_touch_lcd_1_85/firmware.bin
            firmware-merged.bin
            checksums.sha256
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "R48Display ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          files: |
            .pio/build/waveshare_esp32_s3_touch_lcd_1_85/firmware.bin
            firmware-merged.bin
            checksums.sha256
